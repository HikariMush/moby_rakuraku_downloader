name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: .exe をビルド
        run: pyinstaller --onefile --name moby_rakuraku_downloader --console downloader.py

      - name: ffmpeg をダウンロードして dist に配置
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName dist\ffmpeg.exe
          Write-Host "ffmpeg.exe copied from: $($ffmpegExe.FullName)"

      - name: リリースを作成して .exe をアップロード
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎵 moby_rakuraku_downloader ${{ github.ref_name }}

            ### ダウンロード手順（Windows）
            1. 下の `moby_rakuraku_downloader.exe` をダウンロード
            2. `ffmpeg.exe` も同じフォルダにダウンロード
            3. **2つのファイルを同じフォルダ**に置く
            4. `moby_rakuraku_downloader.exe` をダブルクリック
            5. 黒い画面が開いたら SoundCloud のプレイリスト URL を貼り付けて Enter
          files: |
            dist/moby_rakuraku_downloader.exe
            dist/ffmpeg.exe
