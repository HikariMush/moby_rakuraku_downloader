name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: ffmpeg をダウンロードして用意
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extracted -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe が見つかりませんでした" }
          Write-Host "ffmpeg.exe found: $($ffmpegExe.FullName)"
          "ffmpeg_path=$($ffmpegExe.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        id: fetch_ffmpeg

      - name: .exe をビルド
        run: pyinstaller --onefile --add-binary "${{ steps.fetch_ffmpeg.outputs.ffmpeg_path }};." --name moby_rakuraku_downloader --noconsole downloader.py

      - name: リリースを作成して .exe をアップロード
        uses: softprops/action-gh-release@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎵 moby_rakuraku_downloader ${{ github.ref_name }}

            ### ダウンロード手順（Windows）
            1. 下の `moby_rakuraku_downloader.exe` をダウンロード
            2. `moby_rakuraku_downloader.exe` をダブルクリック
            3. URL を貼り付けて「ダウンロード開始」をクリック

            ### 重要
            - この配布物は `ffmpeg` を同梱した単体実行ファイルです。
            - Python を別途インストールする必要はありません。
          files: |
            dist/moby_rakuraku_downloader.exe
